name: CI - Lint & Static Analysis

on:
  push:
    branches:
      - master
    tags-ignore:
      - '**'
  workflow_dispatch:
  repository_dispatch:
    types: [lib-updated]

jobs:

  lint:
    uses: ionrift-gm/ionrift-ci/.github/workflows/lint.yml@main
    with:
      eslint_max_warnings: 250
      eslint_extra_args: "--ignore-pattern 'scripts/tests/**'"
      skip_import_integrity: true

  hygiene:
    uses: ionrift-gm/ionrift-ci/.github/workflows/hygiene.yml@main

  vitest:
    uses: ionrift-gm/ionrift-ci/.github/workflows/vitest.yml@main
    with:
      testharness_repo: 'ionrift-gm/ionrift-testharness'
      testharness_config: 'vitest/respite/vitest.config.js'
    secrets:
      CI_PAT: ${{ secrets.IONRIFT_CI_PAT }}

  forge-safety:
    uses: ionrift-gm/ionrift-ci/.github/workflows/vitest.yml@main
    with:
      testharness_repo: 'ionrift-gm/ionrift-testharness'
      testharness_config: 'vitest/forge-safety/vitest.config.js'
    secrets:
      CI_PAT: ${{ secrets.IONRIFT_CI_PAT }}

  pack-signoff:
    name: Compendium Sign-off Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private module tools
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-testharness
          token: ${{ secrets.IONRIFT_CI_PAT }}
          path: ionrift-testharness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Validate compendium sign-offs
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/validate-packs.mjs

  shipping:
    name: Pack shipping allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private module tools
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-testharness
          token: ${{ secrets.IONRIFT_CI_PAT }}
          path: ionrift-testharness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate shipping manifest
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/validate-shipping.mjs
      - name: Validate string literals (no typographic dashes)
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/validate-strings.mjs

  fallback-parity:
    name: GM/player fallback parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private module tools
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-testharness
          token: ${{ secrets.IONRIFT_CI_PAT }}
          path: ionrift-testharness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check fallback parity
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/fallback_parity.mjs

  event-schema:
    name: Event schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private module tools
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-testharness
          token: ${{ secrets.IONRIFT_CI_PAT }}
          path: ionrift-testharness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate core event JSON
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/validate-event-schema.mjs

  debug-logging:
    name: Debug logging gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout private module tools
        uses: actions/checkout@v4
        with:
          repository: ionrift-gm/ionrift-testharness
          token: ${{ secrets.IONRIFT_CI_PAT }}
          path: ionrift-testharness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Block residual debug traces
        env:
          MODULE_ROOT: ${{ github.workspace }}
        run: node ionrift-testharness/tools/modules/respite/lint-debug-logging.mjs
