name: Release Creation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_discord:
        description: 'Post Discord notification only (no release artifact)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Verify branch sync
        run: |
          git fetch origin master dev 2>/dev/null || true
          if git rev-parse origin/dev >/dev/null 2>&1; then
            if ! git merge-base --is-ancestor origin/dev HEAD; then
              echo "::error::dev branch contains commits not in this release. Sync branches before tagging."
              echo "  HEAD:   $(git rev-parse HEAD)"
              echo "  dev:    $(git rev-parse origin/dev)"
              exit 1
            fi
            echo "OK: dev is an ancestor of HEAD"
          else
            echo "INFO: No dev branch found — skipping sync check"
          fi

      - name: Validate Assets
        run: |
          FIRST_PNG=$(find assets -name '*.png' -type f | head -1)
          if [ -z "$FIRST_PNG" ]; then
            echo "WARNING: No PNG files found in assets/ — skipping validation"
          else
            SIZE=$(wc -c < "$FIRST_PNG")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $FIRST_PNG is only ${SIZE} bytes — likely an LFS pointer, not an image"
              exit 1
            fi
            echo "OK: Asset files are real images (first file: $FIRST_PNG, ${SIZE} bytes)"
          fi

          FIRST_WEBM=$(find assets -name '*.webm' -type f | head -1)
          if [ -z "$FIRST_WEBM" ]; then
            echo "INFO: No WebM files found in assets/ — skipping"
          else
            SIZE=$(wc -c < "$FIRST_WEBM")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $FIRST_WEBM is only ${SIZE} bytes — likely an LFS pointer"
              exit 1
            fi
            echo "OK: WebM files are real assets (first file: $FIRST_WEBM, ${SIZE} bytes)"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate CHANGELOG
        run: node tools/validate-changelog.mjs

      - name: Validate compendium sign-offs
        run: node tools/validate-packs.mjs

      - name: Validate shipping manifest
        run: node tools/validate-shipping.mjs

      - name: Build shipping manifest
        run: node tools/filter-manifest.mjs

      - name: Stage filtered manifest for release
        run: cp .build/module.json module.json

      - name: Validate ES module imports
        run: |
          ERRORS=0
          while IFS= read -r jsfile; do
            DIR=$(dirname "$jsfile")
            # Extract relative import paths: from "./something.js"
            grep -oP "from\s+['\"](\.\./|\./)[^'\"]+['\"]" "$jsfile" 2>/dev/null | while IFS= read -r match; do
              IMPORT_PATH=$(echo "$match" | sed "s/from\s*['\"]//;s/['\"]//")
              TARGET="$DIR/$IMPORT_PATH"
              if [ ! -f "$TARGET" ]; then
                echo "::error file=$jsfile::Import '$IMPORT_PATH' resolves to '$TARGET' which does not exist"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done < <(find scripts/ -name '*.js' -type f)
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS broken import(s) found"
            exit 1
          fi
          echo "OK: All static imports resolve to existing files"

      - name: Verify version matches tag
        run: |
          VERSION=$(jq -r .version module.json)
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::module.json version ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "OK: module.json version ($VERSION) matches tag ($TAG)"

      - name: Compile compendium packs from JSON sources
        run: node tools/compile-packs.mjs

      - name: Validate compiled packs
        run: node tools/validate-packs-local.mjs

      - name: Zip Module
        run: |
          zip -r module.zip . -x ".git/*" ".github/*" ".gitignore" ".gitattributes" "RELEASE_WORKFLOW.md" "task.md" "package.json" "package-lock.json" "node_modules/*" "scripts/tests/*" "data/professions/*" "packs/src/*" "assets/items/forage/*" "*.bak" "audit_*.json" "audit_*.txt" "audit_*.js" "docs/*" "SETUP_GUIDE.md" "TEST_SCENARIOS.md" "BACKLOG.md" "pack-items.mjs" "pack-actors.mjs" "scripts/utils/*" "tests/*" "vitest*" ".eslintrc*" "tools/*" ".build/*"

      - name: Smoke test release ZIP
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          unzip -q $GITHUB_WORKSPACE/module.zip
          ENTRY=$(jq -r '.esmodules[0]' module.json)
          if [ ! -f "$ENTRY" ]; then
            echo "::error::esmodules entry '$ENTRY' not found in release ZIP"
            exit 1
          fi
          echo "OK: Release ZIP contains entry point ($ENTRY)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          make_latest: ${{ !(contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) }}

      - name: Notify Foundry VTT
        if: success() && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
        uses: actions/github-script@v7
        env:
          FOUNDRY_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            const payload = {
              id: manifest.id,
              release: {
                version: manifest.version,
                manifest: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/latest/download/module.json`,
                notes: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${manifest.version}`,
                compatibility: manifest.compatibility
              }
            };
            console.log("Sending payload:", JSON.stringify(payload, null, 2));
            const response = await fetch("https://foundryvtt.com/_api/packages/release_version/", {
              method: "POST",
              headers: { 'Content-Type': 'application/json', 'Authorization': process.env.FOUNDRY_TOKEN },
              body: JSON.stringify(payload)
            });
            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch { data = text; }
            console.log("Response:", typeof data === 'string' ? data : JSON.stringify(data, null, 2));
            if (!response.ok) {
              core.setFailed(`Foundry API Error (${response.status}): ${typeof data === 'string' ? data : JSON.stringify(data)}`);
            } else {
              console.log("Foundry VTT notified successfully.");
            }

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: >
      success() &&
      !contains(github.ref_name, '-rc') &&
      !contains(github.ref_name, '-beta') &&
      !contains(github.ref_name, '-alpha')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            // Extract version from first ## heading
            const versionMatch = changelog.match(/^## \[([^\]]+)\]/m);
            const version = versionMatch ? versionMatch[1] : 'unknown';

            // Extract body between first and second ## headings
            const lines = changelog.split('\n');
            let body = [];
            let found = false;
            for (const line of lines) {
              if (line.startsWith('## ')) {
                if (found) break;
                found = true;
                continue;
              }
              if (found) {
                if (line.startsWith('### ')) {
                  body.push('', `**${line.slice(4)}**`);
                } else {
                  body.push(line);
                }
              }
            }
            let desc = body.join('\n').trim();
            if (desc.length > 3900) {
              desc = desc.slice(0, 3900) + '\n\n_...see full notes on GitHub_';
            }

            const repo = process.env.GITHUB_REPOSITORY;
            const tag = process.env.GITHUB_REF_NAME;
            const payload = {
              embeds: [{
                title: `🔥 Ionrift Respite — v${version}`,
                description: desc,
                color: 0xC9952A,
                url: `https://github.com/${repo}/releases/tag/${tag}`,
                thumbnail: { url: `https://raw.githubusercontent.com/${repo}/master/assets/module-icon.png` }
              }]
            };

            const webhook = process.env.DISCORD_WEBHOOK;
            if (!webhook) {
              core.warning('DISCORD_WEBHOOK_URL secret is not set — skipping Discord notification');
              return;
            }

            const resp = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!resp.ok) {
              const text = await resp.text();
              core.setFailed(`Discord webhook failed (${resp.status}): ${text}`);
            } else {
              console.log('Discord notification posted successfully.');
            }
