name: Release Creation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_discord:
        description: 'Post Discord notification only (no release artifact)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate Assets
        run: |
          # Ensure LFS-tracked PNGs are real images, not pointer stubs
          FIRST_PNG=$(find assets -name '*.png' -type f | head -1)
          if [ -z "$FIRST_PNG" ]; then
            echo "WARNING: No PNG files found in assets/ — skipping validation"
          else
            SIZE=$(wc -c < "$FIRST_PNG")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $FIRST_PNG is only ${SIZE} bytes — likely an LFS pointer, not an image"
              exit 1
            fi
            echo "OK: Asset files are real images (first file: $FIRST_PNG, ${SIZE} bytes)"
          fi

          # Ensure WebM token assets are real files, not LFS pointer stubs
          FIRST_WEBM=$(find assets -name '*.webm' -type f | head -1)
          if [ -z "$FIRST_WEBM" ]; then
            echo "INFO: No WebM files found in assets/ — skipping"
          else
            SIZE=$(wc -c < "$FIRST_WEBM")
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: $FIRST_WEBM is only ${SIZE} bytes — likely an LFS pointer"
              exit 1
            fi
            echo "OK: WebM files are real assets (first file: $FIRST_WEBM, ${SIZE} bytes)"
          fi

      - name: Zip Module
        run: |
          zip -r module.zip . -x ".git/*" ".github/*" ".gitignore" ".gitattributes" "RELEASE_WORKFLOW.md" "task.md" "package.json" "package-lock.json" "node_modules/*" "scripts/tests/*" "data/professions/*" "packs/src/*" "assets/items/forage/*" "*.bak" "audit_*.json" "audit_*.txt" "audit_*.js" "docs/*" "SETUP_GUIDE.md" "TEST_SCENARIOS.md" "BACKLOG.md" "pack-items.mjs" "pack-actors.mjs" "scripts/utils/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          make_latest: ${{ !(contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) }}

      - name: Notify Foundry VTT
        if: success() && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha')
        uses: actions/github-script@v7
        env:
          FOUNDRY_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            
            const payload = {
              id: manifest.id,
              release: {
                version: manifest.version,
                manifest: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/latest/download/module.json`,
                notes: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${manifest.version}`,
                compatibility: manifest.compatibility
              }
            };
            
            console.log("Sending payload:", JSON.stringify(payload, null, 2));
            
            const response = await fetch("https://foundryvtt.com/_api/packages/release_version/", {
              method: "POST",
              headers: {
                'Content-Type': 'application/json',
                'Authorization': process.env.FOUNDRY_TOKEN
              },
              body: JSON.stringify(payload)
            });
            
            const text = await response.text();
            let data;
            try {
              data = JSON.parse(text);
            } catch {
              data = text;
            }
            console.log("Response:", typeof data === 'string' ? data : JSON.stringify(data, null, 2));
            
            if (!response.ok) {
              core.setFailed(`Foundry API Error (${response.status}): ${typeof data === 'string' ? data : JSON.stringify(data)}`);
            } else {
              console.log("Foundry VTT notified successfully.");
            }

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: >
      success() &&
      !contains(github.ref_name, '-rc') &&
      !contains(github.ref_name, '-beta') &&
      !contains(github.ref_name, '-alpha')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the block from the first ## heading to just before the second ## heading.
          # Strips leading/trailing blank lines and Markdown ### sub-headers.
          BODY=$(awk '
            /^## / { if (found) exit; found=1; next }
            found && /^### / { printf "\n**%s**\n", substr($0,5); next }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d' | head -80)

          # Grab the version number from the first ## line
          VERSION=$(awk '/^## / { match($0, /\[([^]]+)\]/, a); print a[1]; exit }' CHANGELOG.md)

          # Truncate body to 3900 chars (Discord embed description limit is 4096)
          BODY_TRIMMED=$(echo "$BODY" | head -c 3900)
          if [ "${#BODY}" -gt 3900 ]; then
            BODY_TRIMMED="${BODY_TRIMMED}\n\n_...see full notes on GitHub_"
          fi

          # Escape for JSON: newlines → \n, quotes → \"
          BODY_JSON=$(echo "$BODY_TRIMMED" | python3 -c "
import sys, json
print(json.dumps(sys.stdin.read()))
" | sed 's/^"//;s/"$//')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          BODY="${{ steps.changelog.outputs.body }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          RELEASE_URL="${REPO_URL}/releases/tag/${{ github.ref_name }}"

          PAYLOAD=$(python3 -c "
import json, sys

version = sys.argv[1]
body    = sys.argv[2]
url     = sys.argv[3]

data = {
  \"embeds\": [{
    \"title\": f\"\\U0001f525 Ionrift Respite — v{version}\",
    \"description\": body,
    \"color\": 0xC9952A,
    \"url\": url,
    \"footer\": {\"text\": \"The Austere Maker • ionrift.com\"},
    \"thumbnail\": {\"url\": \"https://raw.githubusercontent.com/${{ github.repository }}/main/assets/module-icon.png\"}
  }]
}
print(json.dumps(data))
" "$VERSION" "$BODY" "$RELEASE_URL")

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK" | grep -qE '^2' || { echo "Discord webhook POST failed"; exit 1; }
